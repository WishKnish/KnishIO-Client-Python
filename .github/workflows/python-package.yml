name: Python package

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build only on real defects: syntax errors (E9) / invalid
        # literals & comparisons (F63) / misplaced break-continue-return (F7).
        # F82 (undefined name) is intentionally omitted: the SDK uses quoted
        # forward-reference annotations ("Molecule"/"KnishIOClient"/…) for
        # circular-import avoidance, which pyflakes false-flags as F821.
        flake8 . --count --select=E9,F63,F7 --show-source --statistics
        # everything else (line length, undefined-name forward refs, import order)
        # is advisory, not a build failure
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
