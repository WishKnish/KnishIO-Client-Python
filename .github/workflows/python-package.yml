name: Python package

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Set up Node.js (for the ML-KEM noble bridge)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install ML-KEM bridge deps (@noble/post-quantum)
      working-directory: bin
      run: npm ci
    - name: Lint with ruff
      run: |
        # Enforced gate (config in pyproject.toml [tool.ruff.lint]): syntax errors (E9)
        # + pyflakes real bugs (F) + None/bool comparison (E711/E712), over the shipped
        # package + tests. F821 (undefined name) stays relaxed — the SDK uses quoted
        # forward-reference annotations ("Molecule"/"KnishIOClient"/…) for circular-import
        # avoidance, which pyflakes false-flags (the old flake8 gate omitted F82 for the same reason).
        ruff check
    - name: Test with pytest
      run: |
        pytest
