# Python SDK publish — tag-driven PyPI publish via Trusted Publishing / OIDC (cycle 177).
# Push a bare semver tag (e.g. `0.9.1`) → ruff/pytest gate → build sdist+wheel → upload.
#
# Auth = PyPI Trusted Publishing (OIDC) — NO long-lived PYPI_API_TOKEN. One-time maintainer setup:
#   pypi.org → the `knishioclient` project → Settings → Publishing → add a GitHub Actions trusted
#   publisher: owner `WishKnish`, repository `KnishIO-Client-Python`, workflow `publish.yml`.
name: Publish

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  id-token: write   # OIDC for PyPI Trusted Publishing
  contents: write   # create the GitHub Release

jobs:
  publish:
    name: build, test, publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest build
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # The Python SDK shells out to a Node `@noble/post-quantum` bridge for ML-KEM, so the
      # test suite needs the bridge deps installed (mirrors python-package.yml).
      - name: Set up Node.js (for the ML-KEM noble bridge)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ML-KEM bridge deps (@noble/post-quantum)
        working-directory: bin
        run: npm ci

      # Gate — never publish a tag that doesn't lint/test clean.
      - name: Lint with ruff
        run: ruff check

      - name: Test with pytest
        run: pytest

      - name: Build sdist + wheel
        run: python -m build

      # OIDC trusted publishing: no PYPI_API_TOKEN; the action authenticates via the id-token and
      # uploads everything in dist/.
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
