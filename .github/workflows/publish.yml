# Python SDK publish — tag-driven PyPI publish (cycle 177).
# Push a bare semver tag (e.g. `0.9.1`) → ruff/pytest gate → build sdist+wheel → twine upload.
# PREREQUISITE: add the repo secret `PYPI_API_TOKEN` (a PyPI API token, project- or account-scoped).
# Without it the upload step fails.
name: Publish

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  publish:
    name: build, test, publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest build twine
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # The Python SDK shells out to a Node `@noble/post-quantum` bridge for ML-KEM, so the
      # test suite needs the bridge deps installed (mirrors python-package.yml).
      - name: Set up Node.js (for the ML-KEM noble bridge)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ML-KEM bridge deps (@noble/post-quantum)
        working-directory: bin
        run: npm ci

      # Gate — never publish a tag that doesn't lint/test clean.
      - name: Lint with ruff
        run: ruff check

      - name: Test with pytest
        run: pytest

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
